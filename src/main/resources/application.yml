server:
  port: 8081   # user-service runs here

spring:
  application:
    name: project1

  datasource:
    url: jdbc:h2:mem:project1db   # in-memory DB
    driver-class-name: org.h2.Driver
    username: sa
    password: ""                  # H2 default has no password

  jpa:
    hibernate:
      ddl-auto: update            # validate | update | create | create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

jwt:
  secret: mysecretkey123456789
  expiration: 3600000
